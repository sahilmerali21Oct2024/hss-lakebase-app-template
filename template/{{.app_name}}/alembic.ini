[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = driver://placeholder
# The real URL is built dynamically in migrations/env.py from a fresh
# OAuth token + the Lakebase endpoint, because Lakebase credentials are
# short-lived. Do NOT put a real connection string here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
